name: Auto-tag and publish on version bump

on:
  push:
    branches: [main]
    paths: [pyproject.toml]

jobs:
  tag-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for version change
        id: version
        run: |
          NEW=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          OLD=$(git show HEAD~1:pyproject.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/' || echo "")
          echo "new=$NEW old=$OLD"
          if [ "$NEW" != "$OLD" ] && [ -n "$NEW" ]; then
            echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag
        if: steps.version.outputs.tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
      - uses: astral-sh/setup-uv@v7
        if: steps.version.outputs.tag
      - name: Build
        if: steps.version.outputs.tag
        run: uv build
      - name: Create GitHub Release
        if: steps.version.outputs.tag
        run: gh release create ${{ steps.version.outputs.tag }} dist/* --title "${{ steps.version.outputs.tag }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Publish to PyPI
        if: steps.version.outputs.tag
        uses: pypa/gh-action-pypi-publish@release/v1
